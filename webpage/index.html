
<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>My First Web Page</title>
	<style type="text/css">
		body{
			margin: 0px; padding: 0px;
		}
/*Well, content-box is calculated by adding the actual dimensions of padding + border + content. Border-box, on the other hand, is calculated by automatically adjusting the dimensions of padding + border + content to fit the given height and width.*/
		*{
			margin: 0px; padding: 0px; box-sizing: border-box;
		}
		main{
			width: 100%; height:auto;		}
		header{
			width:100%; height: 150px; background-color: #888;
		}

		nav{
			width: 100%; height: 50px; background-color: #CCC;
		}

		section{
			width: 100%; height: 600px;
			display: flex; flex-direction: row; justify-content: space-between;
		}
		#left{
			 width: 38%; height: 600px; background-color: #f5f5f5;
		}

		#right{
			width: 60%; height: 600px; background-color: #000;
		}

		footer{
			width:100%; height: 150px; background-color: #999; margin-top: 10px;
		}
		
	</style>
</head>
<body>
    <main><!--main start-->
    	<header>
    		
    	</header>

    	<nav>
    	</nav>
    	<!--wrapper start-->

    	<section>
    		<div id="left"></div>
    		<div id="right">
    			<img src="images/myPic.png" alt="myPic">
    		</div>
    	</section>

    	<!--wrapper end-->

    	<footer>
    		
    	</footer>
    </main><!--main end-->
</body>
</html>
